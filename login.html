<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        #spinner {
            opacity: 0;
            visibility: hidden;
            transition: opacity .5s ease-out, visibility 0s linear .5s;
            z-index: 99999;
        }

        #spinner.show {
            transition: opacity .5s ease-out, visibility 0s linear 0s;
            visibility: visible;
            opacity: 1;
        }

        * {
            padding: 0;
            margin: 0;
            font-family: sans-serif;
        }

        body {
            background-color: black;

            background-size: cover;
            background-repeat: no-repeat;
            color: white;
            height: 1000px;
        }

        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
        }

        .container h1 {
            font-size: 40px;
            text-align: center;
            margin: 40px 0;
        }

        .container p {
            font-size: 20px;
            margin: 15px 0;
        }

        .container input {
            font-size: 16px;
            padding: 13px 10px;
            width: 100%;
            border: 0;
            border-radius: 5px;
            outline: none;
        }

        .container button {
            font-size: 18px;
            font-weight: bold;
            margin: 20px 0;
            padding: 10px 15px;
            width: 50%;
            border: 0;
            border-radius: 5px;
            background-color: rgb(255, 255, 255);
        }

        .container button:hover {
            cursor: pointer;
        }

        .container h2 {
            font-size: 40px;
            text-align: center;
            margin: 40px 0;
        }

        .btn {
            display: flex;
        }

        .btn button {
            margin: 10px;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
        }

        .container input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .password-container {
            position: relative;
        }

        .password-container input {
            width: calc(100% - 0px);
            padding-right: 30px;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 1.2em;
            color: black;
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <div id="spinner"
        class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>

    <div class="container">
        <h1>LOGIN</h1>

        <p>Username</p>
        <input type="text" name="username" id="username" onkeyup="validateUsername()">
        <span id="validationUsername"></span>

        <p>Password</p>
        <div class="password-container">
            <input type="password" name="password" id="password" onkeyup="validatePassword()">
            <span class="toggle-password" onclick="togglePasswordVisibility()">
                <i id="passwordIcon" class="fa fa-eye"></i>
            </span>
        </div>
        <span id="validationPassword"></span><br>

        <button onclick="login()">Sign in</button>
        <p id="registerLink">Don't have an account? <a href="registeration.html">Register here</a></p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            if (localStorage.getItem("justRegistered") === "true") {
                document.getElementById("registerLink").style.display = "none";
                localStorage.removeItem("justRegistered");
            }
        });

        function validateUsername() {
            let username = document.querySelector("#username").value;
            let validationUsername = document.getElementById("validationUsername");

            let users = JSON.parse(localStorage.getItem("users")) || [];
            let user = users.find(user => user.username === username);

            if (username === "") {
                validationUsername.innerHTML = "Please fill out this field";
                validationUsername.style.color = "red";
            } else if (!user && username !== "admin") {
                validationUsername.innerHTML = "Incorrect Username";
                validationUsername.style.color = "red";
            } else {
                validationUsername.innerHTML = "";
            }
        }

        function validatePassword() {
            let password = document.querySelector("#password").value;
            let username = document.querySelector("#username").value;
            let validationPassword = document.getElementById("validationPassword");

            let users = JSON.parse(localStorage.getItem("users")) || [];
            let user = users.find(user => user.username === username);

            if (password === "") {
                validationPassword.innerHTML = "Please fill out this field";
                validationPassword.style.color = "red";
            } else if ((user && user.password !== password) || (username === "admin" && password !== "123")) {
                validationPassword.innerHTML = "Incorrect Password";
                validationPassword.style.color = "red";
            } else {
                validationPassword.innerHTML = "";
            }
        }

        function validateAll() {
            validateUsername();
            validatePassword();
        }

        function login() {
            let username = document.querySelector("#username").value;
            let password = document.querySelector("#password").value;

            validateAll();

            let validationUsername = document.getElementById("validationUsername");
            let validationPassword = document.getElementById("validationPassword");

            validationUsername.innerHTML = "";
            validationPassword.innerHTML = "";

            if (username === "" || password === "") {
                if (username === "") {
                    validationUsername.innerHTML = "Please fill out this field";
                    validationUsername.style.color = "red";
                }
                if (password === "") {
                    validationPassword.innerHTML = "Please fill out this field";
                    validationPassword.style.color = "red";
                }
                return;
            }






            let users = JSON.parse(localStorage.getItem("users")) || [];
            let user = users.find(user => user.username === username);

            if (!user) {
                validationUsername.innerHTML = "Incorrect Username";
                validationUsername.style.color = "red";
                validationPassword.innerHTML = "Incorrect Password";
                validationPassword.style.color = "red";
            } else if (user.password !== password) {
                validationPassword.innerHTML = "Incorrect Password";
                validationPassword.style.color = "red";
            } else {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('currentUser', JSON.stringify(user));
                window.location.href = "index.html";
            }
        }

        function togglePasswordVisibility() {
            let passwordField = document.getElementById("password");
            let passwordIcon = document.getElementById("passwordIcon");

            if (passwordField.type === "password") {
                passwordField.type = "text";
                passwordIcon.classList.remove("fa-eye");
                passwordIcon.classList.add("fa-eye-slash");
            } else {
                passwordField.type = "password";
                passwordIcon.classList.remove("fa-eye-slash");
                passwordIcon.classList.add("fa-eye");
            }
        }
    </script>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="/js/wow.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
    

</body>

</html>
